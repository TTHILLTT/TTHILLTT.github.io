<!DOCTYPE html>
<html lang="zh_cn" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/win11.css">
    <script>var t=localStorage.getItem('theme')||'dark';document.documentElement.setAttribute('data-theme',t);</script>
    <title>Welcome!</title>
</head>
<body>

<!-- Desktop Background -->
<div class="desktop"></div>

<!-- Desktop Icons -->
<div class="desktop-icons">
    <a class="desktop-icon" href="./pages/socialMedias.html">
        <span class="d-icon">💬</span>
        <span class="d-label">联系方式</span>
    </a>
    <a class="desktop-icon" href="./pages/NGGYU.html">
        <span class="d-icon">⚠️</span>
        <span class="d-label">千万别点</span>
    </a>
    <a class="desktop-icon" href="https://github.com/TTHILLTT" target="_blank" rel="noopener">
        <span class="d-icon">🐙</span>
        <span class="d-label">GitHub</span>
    </a>
    <a class="desktop-icon" href="./pages/tools.html">
        <span class="d-icon">🧰</span>
        <span class="d-label">有用的工具</span>
    </a>
</div>

<!-- Window -->
<main class="content-overlay">
    <div class="window">
        <div class="titlebar">
            <div class="titlebar-left">
                <span class="titlebar-app-icon">🌐</span>
                <span class="titlebar-text">TTHILLTT</span>
            </div>
            <div class="titlebar-controls">
                <button type="button" class="win-ctrl-btn minimize" aria-label="Minimize">&#x2014;</button>
                <button type="button" class="win-ctrl-btn maximize" aria-label="Maximize">&#x25A1;</button>
                <button type="button" class="win-ctrl-btn close" aria-label="Close">&#x2715;</button>
            </div>
        </div>

        <div class="window-body">
            <h1>你好! 👋</h1>
            <h2>这是 <strong>TTHILLTT</strong> 的网站</h2>

            <p class="text-center mx-16">
                或许你可以在 <a class="link-subtle" href="https://github.com/TTHILLTT">GitHub</a> 上关注我！给我的项目发几个 PR 什么的！
            </p>
            <p class="text-center mx-12">
                这是我的 <a class="link-subtle" href="./pages/socialMedias.html">联系方式</a>
            </p>

            <div class="flex-row mx-20">
                <a class="btn-win11" href="./pages/NGGYU.html">⚠️ 千万别点</a>
            </div>

        </div>
    </div>
</main>

<footer class="taskbar">
    <div class="taskbar-center">
        <a class="taskbar-icon active" href="./index.html" title="Home">🏠</a>
        <a class="taskbar-icon" href="https://github.com/TTHILLTT" title="GitHub" target="_blank" rel="noopener">🐙</a>
        <a class="taskbar-icon" href="./pages/socialMedias.html" title="Contact">💬</a>
        <a class="taskbar-icon" href="./pages/NGGYU.html" title="NGGYU">⚠️</a>
        <a class="taskbar-icon" href="./pages/tools.html" title="Tools">🧰</a>
    </div>
    <div class="taskbar-right">
        <button type="button" class="theme-toggle" id="themeToggle" title="切换深浅色模式" aria-label="切换深浅色模式">☀️</button>
        <span id="clock"></span>
    </div>
</footer>

<script>
(function(){
    var theme = document.documentElement.getAttribute('data-theme');
    var btn = document.getElementById('themeToggle');
    if (btn) btn.textContent = theme === 'dark' ? '☀️' : '🌙';
})();

document.getElementById('themeToggle').addEventListener('click', function(){
    var current = document.documentElement.getAttribute('data-theme');
    var next = current === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    this.textContent = next === 'dark' ? '☀️' : '🌙';
    localStorage.setItem('theme', next);
});

(function tick() {
    var d = new Date();
    document.getElementById('clock').textContent =
        d.toLocaleTimeString('zh-CN', {hour:'2-digit',minute:'2-digit'}) + '  ' +
        d.toLocaleDateString('zh-CN', {year:'numeric',month:'2-digit',day:'2-digit'});
    requestAnimationFrame(function(){ setTimeout(tick, 1000 - Date.now() % 1000); });
})();
</script>
</body>
</html>
